name: Deploy to GCE VM

# Runs after a successful image push to Artifact Registry, or manually.
on:
  workflow_run:
    workflows: ["Release Docker image"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. v0.1.0 or latest)"
        required: true
        default: "latest"

permissions:
  contents: read

# Writable by VM_USER without sudo. Override with repo variable VM_DEPLOY_PATH (e.g. /home/hegdegourish25/backend-runai).
env:
  DEPLOY_DIR: ${{ vars.VM_DEPLOY_PATH != '' && vars.VM_DEPLOY_PATH || '/tmp/backend-runai' }}

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Verify configuration
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GEMINI_SECRET_ID: ${{ vars.GCP_GEMINI_SECRET_ID }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          set -e
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "::error::Set repository variable GCP_PROJECT_ID"
            exit 1
          fi
          if [ -z "$GEMINI_SECRET_ID" ]; then
            echo "::error::Set repository variable GCP_GEMINI_SECRET_ID (Secret Manager id, e.g. gemini-api-key)"
            exit 1
          fi
          if [ -z "$VM_HOST" ] || [ -z "$VM_USER" ] || [ -z "$VM_SSH_PRIVATE_KEY" ]; then
            echo "::error::Set secrets VM_HOST, VM_USER, VM_SSH_PRIVATE_KEY"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Copy compose file to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "deploy/vm-compose.yml"
          target: ${{ format('{0}/', env.DEPLOY_DIR) }}
          strip_components: 1

      - name: Pull image and restart container
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GEMINI_SECRET_ID: ${{ vars.GCP_GEMINI_SECRET_ID }}
          GEMINI_SECRET_LOCATION: ${{ vars.GCP_GEMINI_SECRET_LOCATION }}
          IMAGE_REF: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runai/runai-backend:${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || 'latest' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          envs: GCP_PROJECT_ID,GEMINI_SECRET_ID,GEMINI_SECRET_LOCATION,IMAGE_REF,DEPLOY_DIR
          script: |
            set -euo pipefail
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${PATH:-}"
            if ! command -v docker >/dev/null 2>&1; then
              echo "ERROR: docker not in PATH. On Debian VM (sudo) run:"
              echo "  sudo apt-get update && sudo apt-get install -y docker.io docker-compose"
              echo "  sudo usermod -aG docker \"$(whoami)\"  # then log out and SSH back in"
              exit 127
            fi
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "ERROR: need Compose. On Debian: sudo apt-get install -y docker-compose"
              exit 127
            fi
            mkdir -p "${DEPLOY_DIR}"
            cd "${DEPLOY_DIR}"
            LOC=""
            if [ -n "${GEMINI_SECRET_LOCATION:-}" ]; then
              LOC=" --location=${GEMINI_SECRET_LOCATION}"
            fi
            export GEMINI_API_KEY="$(gcloud secrets versions access latest --secret="${GEMINI_SECRET_ID}" --project="${GCP_PROJECT_ID}"${LOC})"
            export GEMINI_MODEL="${GEMINI_MODEL:-gemini-2.5-flash-lite}"
            gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
            $COMPOSE -f vm-compose.yml pull
            $COMPOSE -f vm-compose.yml up -d --remove-orphans
